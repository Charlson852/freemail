name = "mailfree"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars = true

[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db"
database_id = "c7c0928f-dc64-48d4-867d-1b936f187b09"

[assets]
directory = "public"
binding = "ASSETS"

[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

[[routes]]
pattern = "mail.bidfor.top"
zone_name = "bidfor.top"
custom_domain = true

# [observability.logs]
# enabled = true
